<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Laeeqa's Birthday Braai Planner</title>
<style>
:root{
  --paper:#f4f0e8;
  --card:#fffdf8;
  --ink:#171717;
  --muted:#66625b;
  --line:#d8d0c3;
  --soft:#ede6da;
  --accent:#7b3f20;
  --accent2:#3f5f3b;
  --danger:#9a2b2b;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:Arial, Helvetica, sans-serif;
}
.shell{max-width:1120px;margin:0 auto}
header{
  padding:28px 18px 24px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:18px;
  border-bottom:1px solid var(--line);
}
.kicker{
  font-size:11px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:8px;
}
h1{
  margin:0;
  font-size:36px;
  line-height:1;
  letter-spacing:-.05em;
}
.meta{
  color:var(--muted);
  margin-top:10px;
  font-size:14px;
}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}
button{
  font:inherit;
}
.btn{
  border:1px solid var(--ink);
  background:transparent;
  color:var(--ink);
  padding:10px 13px;
  cursor:pointer;
  font-weight:700;
  border-radius:2px;
}
.btn.dark{
  background:var(--ink);
  color:white;
}
.btn.accent{
  background:var(--accent);
  border-color:var(--accent);
  color:white;
}
.nav{
  display:flex;
  overflow:auto;
  background:#fbf8f1;
  border-bottom:1px solid var(--line);
}
.nav button{
  border:0;
  border-right:1px solid var(--line);
  background:transparent;
  padding:15px 16px;
  cursor:pointer;
  white-space:nowrap;
  color:var(--ink);
}
.nav button.active{
  background:var(--ink);
  color:white;
}
.page{
  display:none;
  padding:18px;
}
.page.active{display:block}
.hero{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:16px;
}
.panel{
  background:var(--card);
  border:1px solid var(--line);
  padding:18px;
  border-radius:2px;
}
.panel h2{
  margin:0 0 12px;
  font-size:21px;
  letter-spacing:-.02em;
}
.large{
  font-size:48px;
  font-weight:800;
  letter-spacing:-.06em;
  margin:8px 0;
}
.progress{
  height:9px;
  background:var(--soft);
  overflow:hidden;
  margin:12px 0 8px;
}
.bar{
  height:100%;
  background:var(--accent2);
  width:0;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-top:14px;
}
.person-card{
  background:var(--card);
  border:1px solid var(--line);
  padding:16px;
}
.person-card .name{
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--accent);
  font-weight:800;
}
.person-card .count{
  font-size:34px;
  font-weight:800;
  margin-top:10px;
}
.subtle{color:var(--muted);font-size:13px}
.section{
  background:var(--card);
  border:1px solid var(--line);
  margin-bottom:14px;
}
.section-head{
  padding:14px 16px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  background:#fbf8f1;
}
.section-head h2{
  margin:0;
  font-size:18px;
}
.section-head span{
  font-size:13px;
  color:var(--muted);
}
.addbar{
  display:grid;
  grid-template-columns:1.4fr 1fr 1fr 130px 80px;
  gap:8px;
  padding:14px 16px;
  border-bottom:1px solid var(--line);
}
input,select,textarea{
  width:100%;
  border:1px solid var(--line);
  background:white;
  color:var(--ink);
  padding:11px;
  border-radius:2px;
  font-size:14px;
}
.item{
  display:grid;
  grid-template-columns:34px 1fr auto;
  gap:10px;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid #eee7dc;
}
.item:last-child{border-bottom:0}
.item input[type=checkbox]{
  width:20px;height:20px;accent-color:var(--accent2);
}
.item.done .item-name{
  text-decoration:line-through;
  color:var(--muted);
}
.item-name{font-size:15px}
.item-meta{
  color:var(--muted);
  font-size:12px;
  margin-top:3px;
}
.remove{
  border:0;
  background:transparent;
  color:var(--danger);
  cursor:pointer;
  font-size:18px;
}
.priority-list{
  margin:0;
  padding:0;
  list-style:none;
}
.priority-list li{
  padding:10px 0;
  border-bottom:1px solid #eee7dc;
}
.priority-list li:last-child{border-bottom:0}
.timeline-block{
  padding:16px;
  border-bottom:1px solid #eee7dc;
}
.timeline-block:last-child{border-bottom:0}
.timeline-block h3{
  margin:0 0 10px;
  color:var(--accent);
  font-size:13px;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.timeline-block ul{margin:0;padding-left:18px}
.share-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}
.share-card{
  background:var(--card);
  border:1px solid var(--line);
  padding:16px;
}
.share-card h2{
  margin:0 0 10px;
  font-size:18px;
}
.preview{
  white-space:pre-wrap;
  background:white;
  border:1px solid var(--line);
  padding:13px;
  min-height:180px;
  max-height:290px;
  overflow:auto;
  font-size:14px;
  line-height:1.45;
  margin:12px 0;
}
.empty{
  padding:18px 16px;
  color:var(--muted);
}
@media(max-width:850px){
  header{
    display:block;
    padding:24px 14px 20px;
  }
  h1{font-size:31px}
  .header-actions{margin-top:16px}
  .hero,.grid,.share-grid{grid-template-columns:1fr}
  .page{padding:14px}
  .addbar{grid-template-columns:1fr}
  .nav button{padding:14px 13px}
  .large{font-size:42px}
}
</style>
</head>
<body>
<div class="shell">
<header>
  <div>
    <div class="kicker">Event Planner</div>
    <h1>Laeeqa's Birthday Braai</h1>
    <div class="meta">4 July · 15 guests · shared checklist</div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="go('shopping')">Shopping Mode</button>
    <button class="btn dark" onclick="go('share')">Share</button>
  </div>
</header>

<nav class="nav">
  <button class="active" data-tab="overview">Overview</button>
  <button data-tab="ameer">Ameer</button>
  <button data-tab="aaftab">Aaftab</button>
  <button data-tab="additional">Additional</button>
  <button data-tab="shopping">Shopping</button>
  <button data-tab="assignments">Assignments</button>
  <button data-tab="timeline">Timeline</button>
  <button data-tab="notes">Notes</button>
  <button data-tab="share">Share</button>
</nav>

<main>
  <section class="page active" id="overview"></section>
  <section class="page" id="ameer"></section>
  <section class="page" id="aaftab"></section>
  <section class="page" id="additional"></section>
  <section class="page" id="shopping"></section>
  <section class="page" id="assignments"></section>
  <section class="page" id="timeline"></section>
  <section class="page" id="notes"></section>
  <section class="page" id="share"></section>
</main>
</div>

<script>
const KEY = "laeeqa_braai_final_v4";

const base = [
["Chops","Ameer","Meat","Ameer List",true],["Wings","Ameer","Meat","Ameer List",true],["Sausage","Ameer","Meat","Ameer List",true],["Marinade","Ameer","Meat","Ameer List",true],["Lemon juice","Ameer","Meat","Ameer List",true],
["Garlic rolls","Ameer","Bread","Ameer List",true],["Normal rolls","Ameer","Bread","Ameer List",true],
["Sauces","Ameer","Sauces & Seasoning","Ameer List",true],["Pepper","Ameer","Sauces & Seasoning","Ameer List",true],
["Salad stuff","Ameer","Salads & Sides","Ameer List",true],["Onions","Ameer","Salads & Sides","Ameer List",true],["Tomatoes","Ameer","Salads & Sides","Ameer List",true],["Potatoes","Ameer","Salads & Sides","Ameer List",true],["Lettuce","Ameer","Salads & Sides","Ameer List",true],["Baked beans","Ameer","Salads & Sides","Ameer List",true],
["Coal","Ameer","Fire","Ameer List",true],["Firelighters","Ameer","Fire","Ameer List",true],
["Foil","Ameer","Serving & Storage","Ameer List",true],["Takeaway containers","Ameer","Serving & Storage","Ameer List",true],["Chafing dish","Ameer","Serving & Storage","Ameer List",true],["Burner","Ameer","Serving & Storage","Ameer List",true],
["Paper plates","Ameer","Eating Items","Ameer List",true],["Cups","Ameer","Eating Items","Ameer List",true],["Plastic spoons","Ameer","Eating Items","Ameer List",true],["Plastic forks","Ameer","Eating Items","Ameer List",true],["Paper towels","Ameer","Eating Items","Ameer List",true],["Serviettes","Ameer","Eating Items","Ameer List",true],["Toothpicks","Ameer","Eating Items","Ameer List",true],
["Cold drinks","Ameer","Drinks","Ameer List",true],["Juice","Ameer","Drinks","Ameer List",true],["Water","Ameer","Drinks","Ameer List",true],["Cooler box","Ameer","Drinks","Ameer List",true],["Ice","Ameer","Drinks","Ameer List",true],
["Tea","Ameer","Hot Drinks","Ameer List",true],["Coffee","Ameer","Hot Drinks","Ameer List",true],
["Tablecloth","Ameer","Setup","Ameer List",true],["Tongs","Ameer","Braai Equipment","Ameer List",true],["Braai kit","Ameer","Braai Equipment","Ameer List",true],
["Laeeqa's cake","Ameer","Birthday","Ameer List",true],

["1 × Gazebo gutter","Aaftab","Gazebos & Shelter","Aaftab List",false],["4 × Side walls","Aaftab","Gazebos & Shelter","Aaftab List",false],["2 × Gazebos for eating","Aaftab","Gazebos & Shelter","Aaftab List",false],["1 × Gazebo for fire","Aaftab","Gazebos & Shelter","Aaftab List",false],["12 × Gazebo weight bags","Aaftab","Gazebos & Shelter","Aaftab List",false],
["24 × Chairs","Aaftab","Seating & Tables","Aaftab List",false],["4 × Trestle tables","Aaftab","Seating & Tables","Aaftab List",false],["3 × Black tablecloths","Aaftab","Seating & Tables","Aaftab List",false],
["3 × Lights","Aaftab","Lighting & Power","Aaftab List",false],["Extension cords","Aaftab","Lighting & Power","Aaftab List",false],
["Cable ties","Aaftab","Setup Tools","Aaftab List",false],["Clipper","Aaftab","Setup Tools","Aaftab List",false],
["1 × Braai stand","Aaftab","Braai Equipment","Aaftab List",false],["Braai grid cleaner","Aaftab","Braai Equipment","Aaftab List",false],["Gas lighter gun thingy","Aaftab","Braai Equipment","Aaftab List",false],
["2 × Chafing dishes","Aaftab","Food Serving","Aaftab List",false],["2 × Cooler boxes","Aaftab","Cooling & Drinks","Aaftab List",false]
];

const baseTimeline = [
["Week Before",["Finalise guest count","Confirm who is bringing what","Confirm Aaftab's setup items are available"]],
["2–3 Days Before",["Buy non-perishables","Buy drinks","Check cooler boxes","Check lights and extension leads"]],
["Day Before",["Buy fresh vegetables","Prepare salads if needed","Marinate meat","Put drinks in fridge","Confirm cake collection"]],
["Braai Day Morning",["Collect anything outstanding","Put drinks on ice","Check setup items"]],
["3–4 Hours Before Guests",["Set up gazebos","Set up tables","Set up chairs","Set up serving area"]],
["1 Hour Before",["Start fire","Get meat ready","Put drinks out"]],
["During",["Keep drinks stocked","Move cooked meat to serving area","Bring out cake"]],
["After",["Pack leftovers","Pack equipment","Dispose of rubbish","Return borrowed items"]]
];

function makeId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function newState(){
  return {
    items: base.map(x=>({id:makeId(), name:x[0], assigned:x[1], category:x[2], source:x[3], shopping:x[4], done:false})),
    timeline: baseTimeline,
    notes: ""
  };
}
let state = JSON.parse(localStorage.getItem(KEY) || "null") || newState();

function save(){localStorage.setItem(KEY, JSON.stringify(state))}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function group(arr,key){return arr.reduce((a,x)=>{(a[x[key]||"Other"]??=[]).push(x);return a},{})}
function stats(arr=state.items){return {total:arr.length, done:arr.filter(x=>x.done).length, pending:arr.filter(x=>!x.done).length}}

function itemRow(x){
  return `<div class="item ${x.done?"done":""}">
    <input type="checkbox" ${x.done?"checked":""} onchange="toggleItem('${x.id}')">
    <div>
      <div class="item-name">${esc(x.name)}</div>
      <div class="item-meta">${esc(x.category)} · ${esc(x.assigned)} · ${x.shopping ? "Shopping" : "Setup"}</div>
    </div>
    <button class="remove" onclick="removeItem('${x.id}')" title="Delete">×</button>
  </div>`;
}

function addBar(source, person){
  return `<div class="addbar">
    <input id="${source}-name" placeholder="Add item">
    <input id="${source}-cat" placeholder="Category">
    <input id="${source}-person" placeholder="Assigned to" value="${person}">
    <select id="${source}-type">
      <option value="true">Shopping</option>
      <option value="false">Setup</option>
    </select>
    <button class="btn dark" onclick="addItem('${source}')">Add</button>
  </div>`;
}

function renderSource(tab, source, title, person){
  const arr = state.items.filter(x=>x.source===source);
  const s = stats(arr);
  const grouped = group(arr,"category");
  let html = `<div class="section">
    <div class="section-head"><div><h2>${title}</h2><span>${s.done} of ${s.total} complete</span></div></div>
    ${addBar(source, person)}
  </div>`;
  Object.keys(grouped).forEach(cat=>{
    html += `<div class="section">
      <div class="section-head"><div><h2>${esc(cat)}</h2><span>${grouped[cat].length} items</span></div></div>
      ${grouped[cat].map(itemRow).join("")}
    </div>`;
  });
  document.getElementById(tab).innerHTML = html;
}

function renderOverview(){
  const s = stats();
  const pct = s.total ? Math.round((s.done/s.total)*100) : 0;
  const pendingShopping = state.items.filter(x=>x.shopping&&!x.done).length;
  const priority = state.items.filter(x=>!x.done).slice(0,6);
  const people = group(state.items,"assigned");
  let team = "";
  Object.keys(people).sort().forEach(person=>{
    const ps = stats(people[person]);
    team += `<div class="person-card">
      <div class="name">${esc(person)}</div>
      <div class="count">${ps.done}/${ps.total}</div>
      <div class="subtle">complete</div>
    </div>`;
  });
  document.getElementById("overview").innerHTML = `
    <div class="hero">
      <div class="panel">
        <h2>Event readiness</h2>
        <div class="large">${pct}%</div>
        <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
        <div class="subtle">${s.done} completed · ${s.pending} remaining · ${pendingShopping} shopping left</div>
      </div>
      <div class="panel">
        <h2>Next outstanding</h2>
        <ul class="priority-list">
          ${priority.length ? priority.map(x=>`<li>${esc(x.name)} <span class="subtle">· ${esc(x.assigned)}</span></li>`).join("") : "<li>Everything is complete.</li>"}
        </ul>
      </div>
    </div>
    <div class="grid">${team}</div>`;
}

function renderShopping(){
  const arr = state.items.filter(x=>x.shopping&&!x.done);
  const grouped = group(arr,"category");
  let html = `<div class="section"><div class="section-head"><div><h2>Shopping Mode</h2><span>${arr.length} pending shopping items</span></div></div></div>`;
  if(!arr.length) html += `<div class="section"><div class="empty">No shopping items remaining.</div></div>`;
  Object.keys(grouped).forEach(cat=>{
    html += `<div class="section"><div class="section-head"><div><h2>${esc(cat)}</h2><span>${grouped[cat].length} items</span></div></div>${grouped[cat].map(itemRow).join("")}</div>`;
  });
  document.getElementById("shopping").innerHTML = html;
}

function renderAssignments(){
  const grouped = group(state.items,"assigned");
  let html = "";
  Object.keys(grouped).sort().forEach(person=>{
    const ps = stats(grouped[person]);
    html += `<div class="section">
      <div class="section-head"><div><h2>${esc(person)}</h2><span>${ps.done} of ${ps.total} complete</span></div></div>
      ${grouped[person].map(itemRow).join("")}
    </div>`;
  });
  document.getElementById("assignments").innerHTML = html;
}

function renderTimeline(){
  let html = `<div class="section"><div class="section-head"><div><h2>Timeline</h2><span>Running order for the event</span></div></div>`;
  state.timeline.forEach(([phase,tasks])=>{
    html += `<div class="timeline-block"><h3>${esc(phase)}</h3><ul>${tasks.map(t=>`<li>${esc(t)}</li>`).join("")}</ul></div>`;
  });
  html += `</div>`;
  document.getElementById("timeline").innerHTML = html;
}

function lineItems(arr){
  return arr.map(x => `${x.done ? "✓" : "☐"} ${x.name}${x.assigned ? " - " + x.assigned : ""}`).join("\n");
}
function exportAll(){
  let out = "Laeeqa's Birthday Braai\n4 July · 15 Guests\n\n";
  ["Ameer List","Aaftab List","Additional Items"].forEach(src=>{
    const arr = state.items.filter(x=>x.source===src);
    if(arr.length) out += src + "\n" + lineItems(arr) + "\n\n";
  });
  if(state.notes && state.notes.trim()) out += "Notes\n" + state.notes.trim() + "\n\n";
  return out.trim();
}
function exportPending(){
  let out = "Laeeqa's Birthday Braai - Pending Items\n\n";
  ["Ameer List","Aaftab List","Additional Items"].forEach(src=>{
    const arr = state.items.filter(x=>x.source===src && !x.done);
    if(arr.length) out += src + "\n" + lineItems(arr) + "\n\n";
  });
  return out.trim();
}
function exportShopping(){
  const arr = state.items.filter(x=>x.shopping && !x.done);
  return "Shopping List\n\n" + (arr.length ? arr.map(x=>`☐ ${x.name}`).join("\n") : "Everything shopping-related is complete.");
}
function exportPerson(person){
  const arr = state.items.filter(x=>x.assigned.toLowerCase()===person.toLowerCase() && !x.done);
  return person + "'s Outstanding Items\n\n" + (arr.length ? arr.map(x=>`☐ ${x.name} (${x.source})`).join("\n") : "Nothing outstanding.");
}
function exportTimeline(){
  return "Laeeqa's Birthday Braai - Timeline\n\n" + state.timeline.map(([phase,tasks])=>{
    return phase + "\n" + tasks.map(t=>"☐ " + t).join("\n");
  }).join("\n\n");
}


function renderNotes(){
  document.getElementById("notes").innerHTML = `
    <div class="section">
      <div class="section-head">
        <div>
          <h2>Notes</h2>
          <span>Use this for reminders, ideas, changes, or things to confirm.</span>
        </div>
      </div>
      <div style="padding:16px">
        <textarea id="notesBox" placeholder="Example: Confirm cake collection time, ask Aaftab what time he is coming, remember to send location..." style="min-height:260px;line-height:1.5" oninput="saveNotes()">${esc(state.notes || "")}</textarea>
      </div>
    </div>
  `;
}

function saveNotes(){
  state.notes = document.getElementById("notesBox").value;
  save();
}

function shareCard(title, text, id){
  return `<div class="share-card">
    <h2>${title}</h2>
    <div class="preview" id="${id}">${esc(text)}</div>
    <button class="btn dark" onclick="copyFrom('${id}')">Copy</button>
  </div>`;
}
function renderShare(){
  document.getElementById("share").innerHTML = `<div class="share-grid">
    ${shareCard("Pending only", exportPending(), "sharePending")}
    ${shareCard("Shopping list", exportShopping(), "shareShopping")}
    ${shareCard("Ameer only", exportPerson("Ameer"), "shareAmeer")}
    ${shareCard("Aaftab only", exportPerson("Aaftab"), "shareAaftab")}
    ${shareCard("Timeline", exportTimeline(), "shareTimeline")}
    ${shareCard("Full checklist", exportAll(), "shareFull")}
  </div>`;
}

function addItem(source){
  const name = document.getElementById(source+"-name").value.trim();
  if(!name) return;
  const category = document.getElementById(source+"-cat").value.trim() || "Other";
  const assigned = document.getElementById(source+"-person").value.trim() || "Unassigned";
  const shopping = document.getElementById(source+"-type").value === "true";
  state.items.push({id:makeId(), name, category, assigned, source, shopping, done:false});
  save(); renderAll();
}
function toggleItem(id){
  const item = state.items.find(x=>x.id===id);
  if(item) item.done = !item.done;
  save(); renderAll();
}
function removeItem(id){
  if(!confirm("Delete this item?")) return;
  state.items = state.items.filter(x=>x.id!==id);
  save(); renderAll();
}
function copyFrom(id){
  navigator.clipboard.writeText(document.getElementById(id).innerText);
  alert("Copied. You can paste it into WhatsApp.");
}
function go(tab){
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active", b.dataset.tab===tab));
  document.querySelectorAll(".page").forEach(p=>p.classList.toggle("active", p.id===tab));
  window.scrollTo({top:0, behavior:"smooth"});
}
document.querySelectorAll(".nav button").forEach(b=>b.addEventListener("click",()=>go(b.dataset.tab)));

function renderAll(){
  renderOverview();
  renderSource("ameer","Ameer List","Ameer’s List","Ameer");
  renderSource("aaftab","Aaftab List","Aaftab’s List","Aaftab");
  renderSource("additional","Additional Items","Additional Items","");
  renderShopping();
  renderAssignments();
  renderTimeline();
  renderNotes();
  renderShare();
}
renderAll();
</script>
</body>
</html>
